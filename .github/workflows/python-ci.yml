name: Python CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  quality:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      # --- Quality gates (fail-fast: lint → types → tests) ---

      - name: Lint with Ruff
        run: uv run ruff check --fix --output-format=github src/ tests/ examples/

      - name: Format check with Ruff
        run: uv run ruff format --check src/ tests/ examples/

      - name: Type check with Pyright
        run: uv run pyright src/

      # TODO: Re-enable when tests are green — tracked separately.
      # - name: Run tests
      #   run: uv run pytest tests/ -x -v
