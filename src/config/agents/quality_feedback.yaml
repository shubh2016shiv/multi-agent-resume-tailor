#     computes the three weighted dimensions. But code overwrites all three dimensions,
#     the overall score, AND the pass/fail gate
#     (resume_quality.py:_ground_quality_dimensions).
#     The agent's durable output is only assessment_summary + feedback_for_improvement.
#   * Backstory cited an `evaluate_resume_quality` tool that the agent is NOT wired with;
#     its real tools are "Audit Truthfulness" and "Analyze Keyword Coverage".
#   * Added an explicit anti-false-positive (conservatism) stance -- code comments note the
#     LLM narration is exactly where false positives came from.
#   * Domain-agnostic; trimmed the generic "12 years" narrative.
