optimize_ats_resume_task:
  description: >
    Assemble the already-optimized sections into one ATS-aligned Resume. You are an
    ASSEMBLER, not a rewriter. Works for any field.

    INPUTS (in the CONTEXT section below):
    - assembled_sections: professional_summary_text, optimized_experience_entries,
      optimized_skills. These are AUTHORITATIVE -- copy them through unchanged.
    - preserved_resume_sections: full_name, email, phone_number, location,
      website_or_portfolio, education, certifications, languages. Carry these over as-is.
    - ats_validation_context: job_title, requirements, ats_keywords (for the keyword check).

    STEPS:
    1. Build one complete Resume: the optimized summary text, the optimized experience
       entries (verbatim -- do not edit titles, companies, dates, bullets, or metrics),
       the optimized skills list, and the preserved contact + education facts.
    2. Use standard ATS headers and a simple order, summary first: Professional Summary,
       Work Experience, Skills, Education, Certifications, Languages.
    3. Run your audit tools on the assembled resume text: "Validate ATS Compliance" for
       header/formatting issues, and "Analyze Keyword Coverage" with ats_keywords to see
       which must-have keywords are present.
    4. If a tool flags an issue, fix it ONLY by reordering, standardizing headers, or
       surfacing keywords the optimized sections already support. Add no new facts.
    5. If a required keyword has no truthful support, leave it out and record it in
       unresolved_issues; explain the limitation in keyword_integration_notes.

    HARD RULES:
    - Never fabricate experience, skills, metrics, or credentials, and never use
      job-description text as if it were candidate evidence.
    - Do NOT self-grade ATS compliance or a numeric score: the mechanical checks and the
      final ATS score are computed in code from the rendered document. Your job is honest
      assembly + reporting, not scoring. Do not claim "all keywords integrated" unless the
      Analyze Keyword Coverage tool shows complete coverage.

  expected_output: >
    A single AtsOptimizedResume JSON object: "final_resume" (the assembled Resume),
    "section_order" (standard headers in final order), "optimization_summary" (assembly/ATS
    decisions), "keyword_integration_notes" (how coverage was achieved without stuffing, and
    any keyword that could not be placed truthfully), and "unresolved_issues" (ATS concerns
    not fixable without inventing content; empty list if none).

  agent: ats_optimization_specialist
  output_file: validation/ats_report.json

