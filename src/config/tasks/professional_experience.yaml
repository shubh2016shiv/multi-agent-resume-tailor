#     bullets shipped verbatim; the stage had no way to make them recruiter-readable.
#   * Replaced by a truthful 1:1 rewrite contract enforced in code
#     (experience.py: count parity + claim-inflation number check + rewrite-drift
#     review, one bounded repair, source fallback). See
#     src/agents/professional_experience/professional_experience_architecture.md.
