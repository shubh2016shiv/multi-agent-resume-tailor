optimize_experience_section_task:
  description: >
    Reorder the professional experience bullets for the single role in CONTEXT so the
    most job-relevant evidence comes first. Works for any field. You ONLY reorder.

    THE MECHANISM (why verbatim matters): downstream code accepts your output only when
    your achievements are an exact permutation of the source bullets. If you change even
    one character of any bullet, code rejects your whole proposal and keeps the original
    order -- you lose your only lever. The role's metadata is rebuilt from the source
    regardless of what you emit. So your single effective contribution is bullet ORDER.

    SCOPE: the orchestration layer calls you once per role. Treat the provided role as the
    full evidence boundary. Do not use facts from other roles, skills, education,
    certifications, or personal information.

    YOU MAY NOT rewrite, paraphrase, shorten, expand, split, merge, add, or remove any
    bullet. Return every original achievement string verbatim; change only their order.

    STRICT RULES:
    - The number of achievements must exactly equal the source count.
    - Copy each achievement character-for-character from CONTEXT.
    - Preserve job title, company, dates, location, description, and skills_used exactly.
    - Do not insert job-description keywords into bullet text.
    - Do not change any name, number, or term inside a bullet (e.g. a tool, product, model,
      method, standard, drug, certification, or metric name) -- not even to "correct" it.
    - Do not add scale, counts, teams, leadership, ownership, outcomes, or metrics.

    OUTPUT: return OptimizedExperienceSection JSON with optimized_experiences = one
    Experience object for this role (bullets reordered, everything else copied). The other
    fields are NOT consumed downstream -- set optimization_notes to a short note, and leave
    keywords_integrated and relevance_scores empty/minimal. Do not spend effort on them.

  expected_output: >
    OptimizedExperienceSection JSON with exactly one Experience object whose achievements
    are an exact permutation of the source achievements (same strings, reordered). No
    human-readable text after the JSON.

  agent: experience_section_optimizer
  output_file: content/optimized_experience.json

