optimize_experience_section_task:
  description: >
    Rewrite the professional experience bullets for the single role in CONTEXT so a
    recruiter wants to keep reading. Works for any field. Rewrite each bullet
    ONE-FOR-ONE: the same number of bullets, each rewritten in place (reordering for
    job relevance is allowed).

    WHAT A STRONG BULLET LOOKS LIKE -- aim every rewrite at this spine:
    a strong action verb + the CONCRETE THING you did + its RESULT + the METHOD/tools.
    - Concrete thing: not "an initiative" or "various tasks" but the actual system,
      product, process, or deliverable ("a document-search assistant", "the nightly
      ETL job", "the claims-triage model").
    - Result: the outcome. Use a figure ONLY if the source role states one; otherwise
      use a concrete before/after or the scope the role already gives (what changed,
      for whom, on what system).
    - Method: the approach or tools that make the claim credible.

    MINE THE ROLE'S OWN EVIDENCE -- this is how you make a vague bullet concrete WITHOUT
    inventing. The CONTEXT gives you this role's `description` and `skills_used`, not
    just its bullets. Those are the candidate's own declared facts for THIS role. Pull
    a specific system, domain, or tool into a bullet only when it genuinely fits that
    bullet's work. A role-wide skill does NOT justify putting it into every bullet.
    Never sprinkle tools or JD terms as decoration.

    CANDIDATE-PROVIDED CLARIFICATIONS: a role's description may contain a section
    labeled "Candidate-provided clarifications" -- the candidate's own answers to
    questions from a previous run. These are FIRST-CLASS SOURCE FACTS, the strongest
    evidence you have: use their systems, scope, and figures in the matching bullets
    (a figure from a clarification counts as "in the source role"). Quote their
    numbers exactly; keep their contribution level; and still no hype -- their facts,
    written plainly, are the whole point.

    THE MECHANISM (why truthfulness is not optional): downstream code verifies your
    output. It checks that the bullet count matches the source and that no figure
    appears in your text that is absent from the source role. A violation gets you one
    repair request with the findings; if that also fails, code ships the original
    bullets and your work is discarded. The role's metadata (title, company, dates,
    location, description, skills_used) is rebuilt from the source regardless. Your one
    effective contribution is the achievements text, plus the supporting evidence you
    cite for each rewritten bullet.

    SCOPE: the orchestration layer calls you once per role. Treat the provided role --
    its bullets, description, and skills_used -- as your full evidence boundary. Do not
    borrow facts from other roles, education, certifications, or personal information.

    TRUTHFULNESS RULES (what the verifier and a hiring manager both hold you to):
    - Do NOT state any number, metric, or figure not in the source role. No estimates.
    - Do NOT invent scale, counts, teams, users, leadership, ownership, business
      outcomes, tools, methods, or standards the role's bullets, description, or
      skills_used do not support.
    - Do NOT drop a real achievement, figure, or capability the source states.
    - Keep the SAME contribution level as the source bullet. Supporting or shared work
      must stay supporting or shared work.

    ANTI-HYPE RULES (rewrites that read like AI marketing copy fail review):
    - No hyperbole ("revolutionized", "transformative", "groundbreaking",
      "unprecedented"). Write what actually happened, at its true scale.
    - One plain action verb per bullet -- no stacked verbs or adjective chains
      ("architected, engineered and delivered a robust, scalable, next-generation...").
    - No brochure tone. If a sentence could appear in any company's press release,
      rewrite it into a specific, plain statement of the work.

    PRESERVE THE CONTRIBUTION LEVEL (a hiring manager will probe this in the interview):
    - Replace "responsible for", "worked on", and "helped with" with active phrasing,
      but keep the SAME level of ownership the source states. Assisting stays assisting.
    - "helped with deployment" -> "Supported deployment of..." or "Contributed to
      deploying...", NEVER "Deployed..." or "Led deployment of..." (those claim sole
      ownership the source did not give).
    - Upgrading a supporting or shared contribution into sole ownership is a
      truthfulness failure, not a style improvement.

    WHEN A BULLET HAS NO SUBSTANCE TO MINE -- ASK, DON'T INVENT: if, even after using
    the role's description, skills_used, and any candidate-provided clarifications, a
    bullet still cannot state a concrete result or scope without inventing facts, do
    two things:
    1. Write it plainly and truthfully at whatever specificity the evidence allows --
       do NOT dress it up with hype or fake impact. A modest, honest bullet is correct.
    2. Set that bullet's clarifying_question to the ONE specific question you would ask
       this candidate to make it concrete -- exactly the missing piece (what the thing
       actually was, what changed because of it, who used it, or at what scale), phrased
       the way a professional resume writer asks a client, not a generic template. You
       are the one who just tried to mine this bullet and hit the wall, so you know
       precisely what is missing -- ask for that, not something generic.
    Leave clarifying_question empty/null for every bullet that IS already concrete and
    grounded (naming a real tool or system is not enough by itself -- a bullet with no
    stated result or scope still needs a question, even if it names a tool).

    OUTPUT: return ExperienceRewriteProposal JSON with:
    - rewritten_bullets: one item per source bullet, same count as the source
    - bullet_id: copied exactly from the source bullet record you are rewriting
    - source_bullet: copied exactly from the source bullet you are rewriting
    - rewritten_bullet: the new recruiter-readable bullet
    - supporting_role_evidence: short exact phrases or facts from this same role's
      bullet, description, or skills_used that justify the rewrite
    - ownership_level: one of owned, led, executed, contributed, supported
    - clarifying_question: optional hint about the missing candidate-owned fact for this
      bullet, or null if it needs none. This is advisory only; a separate clarification
      questioner owns the final candidate-facing wording
    - optimization_notes: short note on what you emphasized or what stayed modest

    The supporting evidence must be short and exact, not essay-like. If you cannot point
    to support inside this same role, do not make the rewrite.

  expected_output: >
    ExperienceRewriteProposal JSON whose rewritten_bullets contain the same number of
    items as the source bullets, each rewritten into a specific, plainly written,
    truthful accomplishment. No text after the JSON.

  agent: experience_section_optimizer
  output_file: content/optimized_experience.json

# The candidate clarification questions are NOT a CrewAI task: they are produced in
# the same structured-output call that detects the fact gaps. See
# src/hitl/professional_experience/clarifications.py and its rubric at
# src/config/tool_prompts/hitl/experience_candidate_fact_gap.md.

# Superseded prompts (reorder-only, then rewrite-with-drift-guard) are in git history:
# see commits touching this file before 2026-07-03. This version drops the drift guard
# from the node and adds the XYZ spine + role-evidence mining, because the guard fought
# the specificity we now want and the old prompt never told the writer to mine the
# role's own description/skills_used.
