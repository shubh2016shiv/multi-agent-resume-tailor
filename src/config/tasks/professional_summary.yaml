write_professional_summary_task:
  description: >
    Write a professional summary tailored to the target job, in the candidate's own
    field (any domain -- healthcare, finance, trades, law, education, software, etc.).
    Produce 2 genuinely distinct drafts, then recommend one.

    THE SUMMARY'S ONE JOB: make a recruiter who is skimming want to read the rest of
    the resume. A recruiter is hooked by proof, not categories -- the candidate's
    strongest concrete achievements are your best material, and the evidence below
    contains them. A summary that names capabilities but shows no results has failed
    this job even if every claim is true.

    INPUTS (in the CONTEXT section below):
    - The candidate's resume facts.
    - The alignment strategy (matches, gaps, keywords to integrate, guidance).
    Treat these as your only source of truth. Do not assume a domain; read theirs.

    THE PROFESSIONAL TEMPLATE (this is the structure working resume writers use,
    not a suggestion):
    1. IDENTITY sentence: state the candidate's professional identity, grounded in
       years of experience and specialty. Title and years are allowed as the anchor
       ("[Role identity] with [N] years...") ONLY when the same sentence immediately
       continues into a specific, non-generic detail -- what they actually build,
       for whom, or at what scale. A bare "[title] with [N] years of experience."
       and nothing else is still banned; the years must open onto something
       concrete, not close the sentence.
    2. PROOF sentence(s): the strongest measurable outcomes from the evidence, each
       figure copied exactly as written. This is the recruiter's actual reason to
       keep reading. Do not summarize an achievement into a category ("hands-on
       GenAI engineering") when the source achievement has a number or a named
       system -- state the number or the name.
    3. VALUE sentence: one sentence connecting the strongest remaining capability to
       what this specific target role needs, expressed as something the candidate
       DOES (an active capability tied to a named system or outcome), never as a
       bare list of nouns tacked onto "brings" or "hands-on."
       The value sentence is held to the SAME evidence bar as the proof sentences:
       it must contain at least one exact figure or named system/tool/environment
       from evidence_used. Abstract impact nouns ("measurable impact", "operational
       gains", "business value", "decision-making") cannot be its substance -- if
       the sentence still reads as true after you delete its named system or
       figure, it has failed and must be rewritten.
       It must also be aimed at THIS target role: connect the concrete capability
       to a need the target_role section actually states, in that role's own
       words -- not a generic tail like "in complex environments". A recruiter for
       this specific job should feel the sentence was written at them.
    A skill or JD term may appear inside the identity or proof sentences when it is
    the truthful word for what was built. It must never be the subject of its own
    separate, standalone sentence that just lists capabilities.

    HOW TO WORK EACH DRAFT (follow the output field order -- it is the procedure):
    1. evidence_used: FIRST, list the specific resume/strategy facts you will use and
       the role vocabulary or JD term each one justifies. This is your evidence ledger.
       Start the ledger with the strongest measurable outcomes in the experience
       highlights, copying each figure exactly as written -- these are the facts a
       recruiter reads first, so they must survive into the summary.
    2. content: write the summary using ONLY what is in evidence_used, following THE
       PROFESSIONAL TEMPLATE above.
    3. critique: state strengths/weaknesses, confirm every claim traces to evidence_used,
       and say whether the draft sounds terse and senior rather than like a brochure.
       Reject any draft that sounds like polished generic AI copy even if it is factual,
       and reject any draft whose last sentence is a bare skill list.
    4. score: 0-100, assigned last as a verdict on the finished draft.
    After both drafts, set recommended_version, then call the "Audit Summary Quality"
    tool on your recommended draft. If the audit reports ANY issue -- including a word
    count outside 80-110 (the tool reports the exact count; trust it over your own
    count) -- revise that draft to fix the issue and audit it again. Only finish once
    the audit comes back clean, and record what you changed in writing_notes.

    EVIDENCE RULES (do / don't):
    - DO use the candidate's native professional vocabulary. A JD term belongs only
      when it is the most truthful, precise term for a proven capability.
    - DO keep the strongest supported role vocabulary visible in the final prose when
      those exact terms are the clearest truthful wording. Do not paraphrase them away
      into broader, vaguer categories.
    - DO write the narrower truthful term when the JD term is broader than the evidence
      (write what the resume actually shows, not the broader claim). When the evidence
      only partially matches a JD term (for example the JD wants gradient-boosted
      models and the evidence shows a different ML technique with a real metric), name
      the technique the resume actually shows -- do not claim or imply the JD's
      specific tool.
    - DO state direct operational implications that are already entailed by the evidence
      (for example: migration -> modernization, production support -> operational reliability).
      Keep those implications tight, concrete, and defensible.
    - DO carry the one or two strongest measurable outcomes from the evidence into the
      summary prose, with each figure copied exactly -- never rounded, combined, or
      extrapolated. A summary with no concrete result reads generic even when factual.
      If the evidence genuinely contains no figures, use its most concrete specifics
      (named systems, environments, populations, or scope) instead.
    - DON'T invent years, tools, methods, metrics, seniority, credentials, employers,
      industries, revenue, or unsupported business outcomes. If a number is not in the
      evidence, do not state one.
    - DON'T infer a company/product/sector category unless the resume names it.

    STYLE RULES:
    - Follow THE PROFESSIONAL TEMPLATE above for structure.
    - The first sentence must make a recruiter feel this is a specific person, not a
      category.
    - Do NOT open with broad capability banners such as "Designs and deploys...",
      "Delivers...", "Experienced with...", "Focuses on...", or similar generic lead-ins
      unless the sentence immediately pins that claim to concrete domain evidence.
    - Specific, active, plain, terse, and fact-based -- written for a recruiter or
      hiring manager, not as ATS copy.
    - Use gravity, scope, or stakes language only when the evidence supports it
      (for example: production, regulated, enterprise, mission-critical, operational,
      clinical, real-time, multi-agent).
    - No first person, no hype, and no brochure language.
    - EXACTLY 3 sentences, 80-110 words. Do not add a 4th sentence -- if there is a
      4th thing worth saying, fold it into the value sentence or cut it.
    - BANNED PHRASES: "proven track record", "proven record", "results-driven", "dynamic",
      "passionate", "leveraged", "synergy", "cross-functional", "highly motivated",
      "detail-oriented".
    - ALSO AVOID GENERIC SENTENCE PATTERNS: "Experienced with...", "Skilled in...",
      "Responsible for...", "Focuses on...", "Known for..." when they are used as filler
      instead of a precise evidence-backed claim.
    - ALSO AVOID NEAR-MISS STOCK PHRASES that sound AI-polished even when factual:
      "trusted to ...", "brings ...", "hands-on ...", "designs and ships ...". These are
      banned in EVERY sentence -- identity, proof, and value alike. A capability list
      dressed up as the value sentence is exactly the failure this rule exists to stop;
      moving the phrase to a different sentence does not satisfy this rule.
    - Every sentence must earn its place. If a sentence could fit hundreds of candidates,
      rewrite it until it could plausibly fit only this candidate.

    THE 2 ANGLES (same evidence, different emphasis -- keep them genuinely distinct,
    not two phrasings of the same sentence):
    1. "Problem-Solver Thesis": frame the candidate by the kind of broken, ambiguous,
       or high-value problem they are responsible for solving or building.
    2. "Gravity & Scope": frame the candidate by the scale, stakes, or operational
       complexity of the environments they work in, using only supported evidence.

    WORKED MICRO-EXAMPLE (domain-neutral -- shows the evidence->keyword discipline only,
    do NOT copy any wording):
      evidence_used: "Resume '[managed TASK with METHOD_A]' -> justifies JD keyword
        '[KEYWORD_A]'. Resume '[N years as ROLE]' -> justifies years + '[KEYWORD_B]'.
        JD wants '[KEYWORD_C]' -> no evidence -> excluded."
      content: "[Identity: role] with [N years] building [specific system type].
        [Proof: METHOD_A achievement with exact figure]. [Value: a second concrete
        achievement or named capability tied to [supported environment], aimed at
        [the target role's stated need, in its own words], stated as something
        done, not a list of nouns]."
    Note how [KEYWORD_C] is left out because nothing in the resume supports it, and
    note the final sentence is still a concrete achievement, not a capability list.

    FINAL SELF-CHECK BEFORE YOU RECOMMEND A DRAFT:
    - If sentence 1 could fit a generic GenAI/ML/software candidate, rewrite it.
    - If any sentence reads like banner copy, rewrite it.
    - If the last sentence is a list of skills/tools rather than a stated achievement
      or capability-in-action, rewrite it.
    - If the last sentence contains no exact figure and no named system, or could
      close any candidate's summary for any job, rewrite it -- the closer is held to
      the same evidence bar as the proof sentences, and it must speak to this
      target role's stated needs.
    - If the evidence contains measurable outcomes and your draft states none of them,
      rewrite -- you have traded the candidate's proof for category words.
    - If the audit tool reported a word count outside 80-110, fix the length before
      you finish; both bounds are hard limits, not suggestions.

  expected_output: >
    A valid JSON object conforming to the ProfessionalSummary model:
    - "drafts": 2 objects, each with version_name, strategy_used, evidence_used, content
      (80-110 words), critique, and score.
    - "recommended_version": the version_name of the best draft.
    - "writing_notes": trade-offs between drafts, plus anything the audit tool flagged.

  agent: professional_summary_writer
  output_file: content/professional_summary.txt
