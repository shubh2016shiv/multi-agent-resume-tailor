#   * Removed "Do NOT attempt to use tools" -- the agent HAS the audit_summary tool
#     wired in src/agents/professional_summary/agent.py, so the old line contradicted
#     the wiring. Now the tool is used as the final check.
#   * Removed the "perform tests internally then output JSON" instruction, which asked
#     for hidden reasoning the forced-JSON response_format cannot emit. Reasoning now
#     lives in the evidence_used / critique fields (see models.py field order).
#   * Made angles and examples domain-neutral (old Drafts B/C assumed software:
#     "backend/API/cloud", "datasets/pipelines").
#   * Fixed the word-count contradiction (was 75-125 in description, 75-150 in
#     expected_output) -> a single 80-110 words.
