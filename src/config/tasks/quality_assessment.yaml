assess_quality_task:
  description: >
    Review the optimized resume against the original resume and the job, and produce an
    honest QualityReport. Works for any field.

    READ THIS FIRST -- what is yours vs what code owns:
    - The numeric dimensions (accuracy, relevance, ats_optimization), the
      overall_quality_score, and passed_quality_threshold are ALL recomputed in code from
      mechanical engines and the rendered document, and will REPLACE whatever you put. So
      do not agonize over calibrating numbers -- emit reasonable placeholders and move on.
    - What survives and reaches a human is your `assessment_summary` and
      `feedback_for_improvement`. Spend your effort there.

    HOW TO REVIEW (ground everything in tools, not impressions):
    1. Call "Audit Truthfulness" with the ORIGINAL resume and the OPTIMIZED resume. This is
       the heart of the job: find claims that are genuinely invented, inflated, or
       unsupported by the original.
    2. Call "Analyze Keyword Coverage" with the optimized resume text and the job's
       keywords to judge how well the resume answers the role.
    3. Write feedback_for_improvement: specific and fixable -- name the exact item, why it
       is a problem, and the concrete fix. If nothing is wrong, set it to null.
    4. Write assessment_summary: a short, honest high-level verdict.

    BE CONSERVATIVE (this is the main quality rule):
    - If a claim traces to the original resume, it is NOT an exaggeration -- do not flag it.
    - Do not call a clean, single-column, standard-header layout "broken".
    - Only raise an issue you can evidence from a tool result or a direct comparison. Never
      invent problems to look thorough. An over-eager review creates noise; a precise one
      protects the candidate from sending a dishonest resume.

  expected_output: >
    A single QualityReport JSON object: overall_quality_score (placeholder float; code
    recomputes), passed_quality_threshold (placeholder bool; code recomputes),
    assessment_summary (honest high-level verdict), accuracy / relevance / ats_optimization
    (best-effort metric objects; code overwrites them), and feedback_for_improvement
    (specific, fixable guidance grounded in the audit tools, or null if nothing is wrong).

  agent: quality_assurance_reviewer

