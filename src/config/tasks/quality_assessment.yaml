quality_assurance_task:
  description: >
    Conduct the final comprehensive quality review of the tailored resume.
    Your task is to:
    1. Review the complete resume for accuracy, ensuring no exaggerations or false claims.
    2. Check for internal consistency between the summary, experience, and skills sections.
    3. Validate writing quality for grammar, spelling, and professional tone.
    4. Verify strategic alignment, ensuring all critical job requirements are addressed.
    5. Confirm the truthfulness of all claims against the original resume.
    You are the final gatekeeper. Be thorough, critical, and fair.

  expected_output: >
    A comprehensive quality assurance report as a JSON object containing:
    - "approved": a boolean indicating the final decision.
    - "overall_quality_score": a 0-100 rating.
    - Detailed checks for accuracy, consistency, writing quality, and strategic alignment.
    - "final_recommendation": "APPROVED FOR SUBMISSION" or "REQUIRES CORRECTIONS".
    - "corrections_needed": a specific, prioritized list of corrections if not approved.
    This is the final validation before the resume is considered complete.

  context:
    - ats_optimization_task
    - write_professional_summary_task
    - optimize_experience_section_task
    - optimize_skills_section_task
    - extract_resume_content_task
    - create_alignment_strategy_task
  agent: quality_assurance_reviewer
  output_file: validation/final_qa_report.json

assess_quality_task:
  description: >
    Audit the optimized resume against the original resume and the job description,
    and produce a quantitative QualityReport across three weighted dimensions.

    Ground every score in a tool check -- do not score from impression alone:
    1. ACCURACY (40%): Call "Audit Truthfulness" with the ORIGINAL resume JSON and the
       OPTIMIZED resume JSON. Flag any invented, inflated, or unsupported claims.
    2. RELEVANCE (35%): Call "Analyze Keyword Coverage" with the optimized resume text
       and the job's keywords. Judge how well the resume answers the job's requirements.
    3. ATS OPTIMIZATION (25%): Call "Validate ATS Compliance" on the optimized resume
       text. Flag formatting problems and non-standard section headers.

    Compute overall_quality_score as the weighted blend of the three dimension scores.
    If anything is unsupported or below par, put specific, actionable guidance in
    feedback_for_improvement. Be the final, honest gatekeeper -- never approve a resume
    that exaggerates beyond what the original supports.

  expected_output: >
    A single QualityReport JSON object with: "overall_quality_score" (float 0-100, weighted
    blend), "passed_quality_threshold" (bool, best estimate; code will recompute it),
    "assessment_summary" (short high-level verdict), "accuracy" (AccuracyMetrics object),
    "relevance" (RelevanceMetrics object), "ats_optimization" (ATSMetrics object), and
    "feedback_for_improvement" (specific guidance if anything fell short, else null).
    Output ONLY the valid QualityReport JSON.

  agent: quality_assurance_reviewer
