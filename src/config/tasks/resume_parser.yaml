extract_resume_content_task:
  description: >
    Extract a structured Resume from the resume FILE PATH in CONTEXT (not resume text).
    Works for any field. You are the root of the pipeline -- extract faithfully; fabrication
    here corrupts every later stage.

    INGESTION SEQUENCE (you own these tools; run in order):
    1. "Convert Resume Document to Markdown" on the file path.
    2. "Check Resume Markdown Quality". If it reports a BLOCKER, STOP and explain the
       conversion problem instead of extracting from unreliable text.
    3. If a "Redact PII from Resume Markdown" tool is available to you, run it now (before
       extraction). If no such tool is present, skip this step.
    4. "Extract Structured Resume from Markdown".

    EXTRACT into the Resume model, using ONLY what the document states:
    - Personal info: full_name, email, phone_number, location, website_or_portfolio.
    - professional_summary (the resume's own summary/objective, if present).
    - work_experience: every role the resume lists, with job_title, company, dates,
      description, achievements, and skills_used -- copied as written.
    - education, certifications, languages as listed.
    - skills as listed (use the resume's own categories where given).

    SOURCE-FIDELITY RULES (the point of this agent):
    - Do NOT infer "implicit" skills, invent metrics/numbers, upgrade titles, or rephrase
      achievement bullets. Record what is written.
    - Extract however many experiences and skills the resume actually contains -- there is
      no minimum. Do not pad to reach a count.
    - Leave a field empty/null when the resume does not provide it; never guess dates,
      locations, or numbers.

  expected_output: >
    A valid Resume JSON object faithfully reflecting the document: personal info, the
    professional_summary if present, all work_experience entries as written, education,
    certifications, languages, and the skills the resume lists. Every value must trace to
    the resume text -- no inferred or padded content. Empty/null where the resume is silent.

  agent: resume_content_extractor
  output_file: analysis/resume_extraction.json

# =============================================================================
# SUPERSEDED 2026-06-22 -- kept for reference, not loaded. Why replaced:
#   * Removed PHANTOM outputs the Resume schema cannot hold: "identify patterns of career
#     growth", "calculate total years of experience". Those fields do not exist on Resume,
#     so the instructions were discarded work (Pattern 6).
#   * Removed the arbitrary minimums "(at least 3 entries)" and "(at least 20 skills)".
#     For an EXTRACTOR at the root of the pipeline, a quota pressures fabrication; now it
#     extracts exactly what the document contains.
#   * Added the feature-flagged redact step conditionally ("if available") -- the agent is
#     wired with the redact tool only when enable_pii_redaction is on.
#   * Reframed toward source fidelity (no implicit skills, no invented metrics, no rephrasing)
#     and made it domain-agnostic.
# -----------------------------------------------------------------------------
