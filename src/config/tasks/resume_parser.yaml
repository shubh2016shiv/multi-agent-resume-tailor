extract_resume_content_task:
  description: >
    Extract and structure the candidate's resume information from the resume file path.

    IMPORTANT: The CONTEXT section contains a resume file path, not resume text.
    You own the document-ingestion sequence. Use your tools in this order:
    1. Convert Resume Document to Markdown
    2. Check Resume Markdown Quality
    3. Extract Structured Resume from Markdown

    If the quality check reports a BLOCKER, stop and explain the conversion problem
    instead of extracting from unreliable text.

    Your task is to:
    1. Read the resume file path from the CONTEXT section.
    2. Convert the file to Markdown using the conversion tool.
    3. Check the converted Markdown quality before extraction.
    4. Extract all information into a structured `Resume` model, including:
       - Personal information (name, email, phone, location).
       - The professional summary or objective.
       - All work experience entries with job titles, companies, dates, descriptions,
         quantifiable achievements, and skills used in each role.
       - The education section with degrees, institutions, and graduation years.
       - The skills section, categorized into technical, soft, and domain-specific skills.
    6. Identify patterns of career growth and areas of deep expertise.
    7. Calculate the total years of professional experience.
    8. Ensure the accuracy and completeness of all extracted data.
    Output a structured `Resume` model with the complete career history.

  expected_output: >
    A comprehensive JSON object representing a `Resume`. This object must include:
    - Complete personal information.
    - The professional summary.
    - All work experiences (at least 3 entries) with detailed achievements.
    - A full education history.
    - A categorized list of skills (at least 20 skills).
    - A calculation of the total years of experience.
    The output must be a valid JSON that conforms to the `Resume` model structure.

  agent: resume_content_extractor
  output_file: analysis/resume_extraction.json
