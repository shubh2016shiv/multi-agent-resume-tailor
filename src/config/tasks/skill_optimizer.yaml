optimize_skills_section_task:
  description: >
    Reorder and optimize the skills section for maximum ATS matching and relevance
    without adding unsupported capabilities.
    Your task is to:
    1. Review skills from the original resume, experience evidence, alignment strategy,
       and the job description.
    2. Build a truthful skills inventory from resume evidence first.
    3. Reorder skills strategically: must-have skills first, then should-have, then nice-to-have.
    4. Use the exact terminology from the job posting only when accurate.
    5. Group skills logically (e.g., Technical Skills, Programming Languages, Tools & Platforms).
    6. Add only evidence-backed transferable or synonymous skills.
    7. Remove outdated or irrelevant skills.

    CRITICAL TRUTHFULNESS RULES:

    ALLOWED:
    - Keep original resume skills that are still relevant.
    - Normalize terminology when the resume evidence clearly supports the JD term
      (for example, "RESTful APIs" may match "REST APIs").
    - Add a JD keyword only when experience, project, education, certification, or
      existing skills evidence proves the candidate has that capability.
    - Add a broader category only when the resume gives concrete examples inside it
      (for example, "cloud platforms" may be supported by AWS Lambda evidence).

    FORBIDDEN:
    - Do not treat job description requirements as candidate evidence.
    - Do not add a tool because it is common in a domain.
    - Do not add database, framework, language, observability, stream-processing,
      SaaS, enterprise software, open-source, GraphQL, Kubernetes, Terraform, or
      MLOps claims unless the resume evidence explicitly supports them.
    - Do not add skills based only on company names or employer reputation.

    YOUR WORKFLOW:
    1. Extract candidate-evidenced skills from resume skills and experience.
    2. Compare evidenced skills against must-have, should-have, and nice-to-have JD targets.
    3. Add missing JD keywords only when supported by candidate evidence.
    4. Leave unsupported JD keywords out of optimized_skills; mention them in
       optimization_notes as unresolved rather than inventing them.
    5. Prioritize skills: evidenced must-have then evidenced should-have then domain strengths.
    6. Categorize skills using domain-appropriate categories.
    7. Remove outdated, irrelevant, duplicate, or unsupported skills.

    VALIDATION REQUIREMENTS:
    For EVERY optimized skill:
    1. Provide specific evidence from the candidate resume or experience.
    2. The evidence field must not quote the job description.
    3. Explain the logical connection clearly in justification.
    4. Rate confidence (0-100%) and include only if >= 70.
    5. Consider: Would a recruiter in this field accept this inference?

    SKILL PRIORITIZATION STRATEGY:
    1. EVIDENCED MUST-HAVE: List first, using exact JD terminology when truthful.
    2. EVIDENCED SHOULD-HAVE: List second.
    3. DOMAIN STRENGTHS: Highlight candidate's strongest proven expertise.
    4. ADDITIONAL: Other relevant evidenced skills.
    5. LIMIT: Keep total to 15-25 skills for readability.

    ATS OPTIMIZATION:
    - Use exact keywords from job posting where accurate.
    - Include variations (e.g., "ML" and "Machine Learning").
    - Place highest-priority keywords in first category.
    - Ensure must-have skills are captured.

  expected_output: >
    A complete JSON object conforming to the OptimizedSkillsSection model with:
    - "optimized_skills": list of skill objects with skill_name, category, proficiency_level,
      justification, and evidence.
    - "skill_categories": dict mapping category names to skill lists.
    - "added_skills": list of inferred skill objects including confidence_score.
    - "removed_skills": list of removed skill names.
    - "optimization_notes": summary of what changed and why.
    - "ats_match_score": float 0-100.
    All optimized and added skills must have candidate-evidence-based justifications and
    confidence >= 70. Do not use job description text as evidence.

  context:
    - create_alignment_strategy_task
    - extract_resume_content_task
  agent: skills_section_strategist
  output_file: content/optimized_skills.json
